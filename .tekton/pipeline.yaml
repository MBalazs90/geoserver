---
# Task: git-clone (handles both branch names and commit SHAs)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
  workspaces:
    - name: output
  results:
    - name: commit
      description: The short commit SHA
  steps:
    - name: clone
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      script: |
        #!/bin/bash
        set -e
        microdnf install -y git-core > /dev/null 2>&1
        cd $(workspaces.output.path)
        git init
        git remote add origin $(params.url)
        git fetch --depth 1 origin $(params.revision)
        git checkout FETCH_HEAD
        COMMIT=$(git rev-parse --short HEAD)
        echo "Cloned @ $COMMIT"
        echo -n "$COMMIT" > $(results.commit.path)
---
# Task: Maven build
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
spec:
  params:
    - name: goals
      type: string
      default: "package -DskipTests"
  workspaces:
    - name: source
  steps:
    - name: build
      image: docker.io/maven:3.9-eclipse-temurin-17
      workingDir: $(workspaces.source.path)/src
      resources:
        requests:
          cpu: "1"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 6Gi
      script: |
        #!/bin/bash
        set -e
        echo "=== Maven Build ==="
        echo "Working dir: $(pwd)"
        echo "Modules: $(grep '<module>' pom.xml | head -3 | tr -d ' ')"

        mvn -B \
          -Dmaven.repo.local=$(workspaces.source.path)/.m2 \
          $(params.goals)

        echo "=== Finding build output ==="
        OUTPUT=$(find . -name "gs-web-app*.jar" -not -name "*sources*" -not -name "*tests*" -path "*/target/*" | head -1)
        if [ -z "$OUTPUT" ]; then
          OUTPUT=$(find . -name "geoserver*.war" -path "*/target/*" | head -1)
        fi
        if [ -z "$OUTPUT" ]; then
          echo "WARN: No WAR/JAR found, listing all targets:"
          find . -path "*/target/*.jar" -o -path "*/target/*.war" | head -10
          echo "Continuing anyway — Dockerfile uses base image"
        fi
        if [ -n "$OUTPUT" ]; then
          echo "=== Output: $OUTPUT ==="
          ls -lh "$OUTPUT"
          cp "$OUTPUT" $(workspaces.source.path)/geoserver.war
        fi
---
# Task: Build + push container image
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push-image
spec:
  params:
    - name: image
      type: string
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: registry.access.redhat.com/ubi9/buildah:latest
      workingDir: $(workspaces.source.path)
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/bin/bash
        set -e
        echo "=== Building $(params.image) ==="
        ls -lh geoserver.war 2>/dev/null || echo "No WAR found — Dockerfile will use base image only"

        buildah bud \
          --storage-driver=vfs \
          --tls-verify=false \
          --layers \
          -f Dockerfile \
          -t $(params.image) .

        buildah push \
          --storage-driver=vfs \
          --tls-verify=false \
          $(params.image)

        echo "=== Image pushed ==="
---
# Task: Deploy with Helm
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-deploy
spec:
  params:
    - name: release-name
      type: string
      default: geoserver
    - name: image-tag
      type: string
      default: latest
    - name: namespace
      type: string
      default: geoserver
  workspaces:
    - name: source
  steps:
    - name: deploy
      image: docker.io/alpine/helm:3.16.4
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        echo "=== Helm Deploy ==="
        helm upgrade --install $(params.release-name) ./deploy/helm/ \
          --namespace $(params.namespace) \
          --set image.tag=$(params.image-tag) \
          --wait --timeout 5m
        echo "=== Done ==="
        helm list -n $(params.namespace)
---
# The Pipeline
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: geoserver-pipeline
spec:
  params:
    - name: git-url
      type: string
      default: "https://github.com/MBalazs90/geoserver.git"
    - name: git-revision
      type: string
      default: main
    - name: image
      type: string
      default: "image-registry.openshift-image-registry.svc:5000/geoserver/geoserver"
    - name: image-tag
      type: string
      default: latest
  workspaces:
    - name: shared-workspace

  tasks:
    - name: clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: "$(params.git-url)"
        - name: revision
          value: "$(params.git-revision)"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: build
      taskRef:
        name: maven-build
      runAfter: [clone]
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: build-image
      taskRef:
        name: build-push-image
      runAfter: [build]
      params:
        - name: image
          value: "$(params.image):$(params.image-tag)"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: deploy
      taskRef:
        name: helm-deploy
      runAfter: [build-image]
      params:
        - name: release-name
          value: geoserver
        - name: image-tag
          value: "$(params.image-tag)"
        - name: namespace
          value: geoserver
      workspaces:
        - name: source
          workspace: shared-workspace
