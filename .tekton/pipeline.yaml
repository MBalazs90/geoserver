---
# Task: git-clone
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
  workspaces:
    - name: output
  results:
    - name: commit
      description: The short commit SHA
  steps:
    - name: clone
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      script: |
        #!/bin/bash
        set -e
        microdnf install -y git-core > /dev/null 2>&1
        cd $(workspaces.output.path)
        git init
        git remote add origin $(params.url)
        git fetch --depth 1 origin $(params.revision)
        git checkout FETCH_HEAD
        COMMIT=$(git rev-parse --short HEAD)
        echo "Cloned @ $COMMIT"
        echo -n "$COMMIT" > $(results.commit.path)
---
# Task: Build + push container image (multi-stage Dockerfile does Maven build inside)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push-image
spec:
  params:
    - name: image
      type: string
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: registry.access.redhat.com/ubi9/buildah:latest
      workingDir: $(workspaces.source.path)
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      resources:
        requests:
          cpu: "2"
          memory: 6Gi
        limits:
          cpu: "4"
          memory: 8Gi
      script: |
        #!/bin/bash
        set -e
        echo "=== Building $(params.image) ==="
        echo "Multi-stage: Maven build + UBI deploy"

        buildah bud \
          --storage-driver=vfs \
          --tls-verify=false \
          --layers \
          -f Dockerfile \
          -t $(params.image) .

        buildah push \
          --storage-driver=vfs \
          --tls-verify=false \
          $(params.image)

        echo "=== Image pushed ==="
---
# Task: Deploy with Helm
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: helm-deploy
spec:
  params:
    - name: release-name
      type: string
      default: geoserver
    - name: image-tag
      type: string
      default: latest
    - name: namespace
      type: string
      default: geoserver
  workspaces:
    - name: source
  steps:
    - name: deploy
      image: docker.io/alpine/helm:3.16.4
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        helm upgrade --install $(params.release-name) ./deploy/helm/ \
          --namespace $(params.namespace) \
          --set image.tag=$(params.image-tag) \
          --wait --timeout 10m
        helm list -n $(params.namespace)
---
# Task: Trivy CVE scan on container image
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-scan
spec:
  params:
    - name: image
      type: string
    - name: severity
      type: string
      default: "CRITICAL,HIGH"
    - name: fail-on
      type: string
      default: "CRITICAL"
  results:
    - name: vulnerabilities
      description: Summary of CVEs found
  steps:
    - name: scan
      image: docker.io/aquasec/trivy:latest
      script: |
        #!/bin/sh
        set -e
        echo "=== Trivy CVE Scan ==="
        echo "Image:    $(params.image)"
        echo "Severity: $(params.severity)"
        echo "Fail on:  $(params.fail-on)"
        echo ""

        # Scan the image (pull from internal registry, skip TLS verify)
        trivy image \
          --severity $(params.severity) \
          --no-progress \
          --insecure \
          --format table \
          $(params.image) | tee /tmp/trivy-report.txt

        SUMMARY=$(trivy image \
          --severity $(params.severity) \
          --no-progress \
          --insecure \
          --format json \
          $(params.image) | \
          python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        total = 0
        by_sev = {}
        for result in data.get('Results', []):
            for vuln in result.get('Vulnerabilities', []):
                total += 1
                sev = vuln.get('Severity', 'UNKNOWN')
                by_sev[sev] = by_sev.get(sev, 0) + 1
        summary = ', '.join(f'{k}:{v}' for k,v in sorted(by_sev.items()))
        print(f'Total: {total} ({summary})')
        " 2>/dev/null || echo "Summary unavailable")

        echo ""
        echo "=== $SUMMARY ==="
        printf '%s' "$SUMMARY" > $(results.vulnerabilities.path)

        # Fail pipeline if critical CVEs found
        CRITICAL_COUNT=$(trivy image \
          --severity $(params.fail-on) \
          --no-progress \
          --insecure \
          --format json \
          $(params.image) | \
          python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        count = sum(len(r.get('Vulnerabilities', [])) for r in data.get('Results', []))
        print(count)
        " 2>/dev/null || echo "0")

        if [ "$CRITICAL_COUNT" -gt "0" ] 2>/dev/null; then
          echo ""
          echo "WARNING: $CRITICAL_COUNT $(params.fail-on) vulnerabilities found!"
          echo "Pipeline will continue but review the report above."
          # To hard-fail on critical CVEs, uncomment:
          # exit 1
        fi
        echo ""
        echo "=== Scan complete ==="
---
# Pipeline: clone → build+image (multi-stage) → trivy-scan → deploy
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: geoserver-pipeline
spec:
  params:
    - name: git-url
      type: string
      default: "https://github.com/MBalazs90/geoserver.git"
    - name: git-revision
      type: string
      default: main
    - name: image
      type: string
      default: "image-registry.openshift-image-registry.svc:5000/geoserver/geoserver"
    - name: image-tag
      type: string
      default: latest
  workspaces:
    - name: shared-workspace

  tasks:
    - name: clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: "$(params.git-url)"
        - name: revision
          value: "$(params.git-revision)"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: build-image
      taskRef:
        name: build-push-image
      runAfter: [clone]
      params:
        - name: image
          value: "$(params.image):$(params.image-tag)"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: trivy-scan
      taskRef:
        name: trivy-scan
      runAfter: [build-image]
      params:
        - name: image
          value: "$(params.image):$(params.image-tag)"
        - name: severity
          value: "CRITICAL,HIGH"
        - name: fail-on
          value: "CRITICAL"

    - name: deploy
      taskRef:
        name: helm-deploy
      runAfter: [trivy-scan]
      params:
        - name: release-name
          value: geoserver
        - name: image-tag
          value: "$(params.image-tag)"
        - name: namespace
          value: geoserver
      workspaces:
        - name: source
          workspace: shared-workspace
