---
# Task: git-clone
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
  workspaces:
    - name: output
  results:
    - name: commit
      description: The short commit SHA
  steps:
    - name: clone
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      script: |
        #!/bin/bash
        set -e
        microdnf install -y git-core > /dev/null 2>&1
        cd $(workspaces.output.path)
        git init
        git remote add origin $(params.url)
        git fetch --depth 1 origin $(params.revision)
        git checkout FETCH_HEAD
        COMMIT=$(git rev-parse --short HEAD)
        echo "Cloned @ $COMMIT"
        echo -n "$COMMIT" > $(results.commit.path)
---
# Task: Build + push container image (multi-stage Dockerfile does Maven build inside)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push-image
spec:
  params:
    - name: image
      type: string
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: registry.access.redhat.com/ubi9/buildah:latest
      workingDir: $(workspaces.source.path)
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      resources:
        requests:
          cpu: "2"
          memory: 6Gi
        limits:
          cpu: "4"
          memory: 8Gi
      script: |
        #!/bin/bash
        set -e
        echo "=== Building $(params.image) ==="
        echo "Multi-stage: Maven build + UBI deploy"

        buildah bud \
          --storage-driver=vfs \
          --tls-verify=false \
          --layers \
          -f Dockerfile \
          -t $(params.image) .

        buildah push \
          --storage-driver=vfs \
          --tls-verify=false \
          $(params.image)

        echo "=== Image pushed ==="
